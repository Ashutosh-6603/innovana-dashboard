services:
  postgres:
    image: postgres:15
    container_name: postgres-employee-dashboard
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: employee_dashboard
      POSTGRES_PASSWORD: 1234567890
      POSTGRES_DB: employee_dashboard
    volumes:
      - employee-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U employee_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: redis-employee-dashboard
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --requirepass StrongRedisPass123!

volumes:
  employee-postgres-data: